# Pre-commit 配置 - 多智能体工作空间
# 适用范围：所有 agents 项目
# 执行时机：每次 git commit 前

repos:
  # 基础检查
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        name: 删除行尾空格
      - id: end-of-file-fixer
        name: 文件末尾空行
      - id: check-yaml
        name: YAML 语法检查
      - id: check-json
        name: JSON 语法检查
      - id: check-added-large-files
        name: 大文件检查
        args: ['--maxkb=1000']
      - id: detect-private-key
        name: 私钥检测
      - id: check-merge-conflict
        name: 合并冲突检查

  # Python 代码格式化
  - repo: https://github.com/psf/black
    rev: 26.3.1
    hooks:
      - id: black
        name: Black 格式化
        language_version: python3
        args: [--line-length=120]

  # Python 导入排序
  - repo: https://github.com/pycqa/isort
    rev: 8.0.1
    hooks:
      - id: isort
        name: Isort 导入排序
        args: ["--profile", "black", "--line-length=120"]

  # Python 代码风格检查
  - repo: https://github.com/pycqa/flake8
    rev: 7.3.0
    hooks:
      - id: flake8
        name: Flake8 风格检查
        args: [--max-line-length=120, --extend-ignore=E203, --per-file-ignores="__init__.py:F401"]

  # Python 安全扫描
  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        name: Bandit 安全扫描
        args: ["-r", "-ll"]

  # 敏感信息检测
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        name: 敏感信息检测
        args: ['--baseline', '.secrets.baseline']
        exclude: package.lock.json

  # Markdown 格式化
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        name: Prettier 格式化
        types: [markdown]
        args: [--prose-wrap=always, --print-width=120]

# 跳过检查的文件
exclude: |
  (?x)^(
    coverage\.xml|
    \.coverage|
    \.pytest_cache/|
    node_modules/|
    \.venv/|
    __pycache__/
  )$
