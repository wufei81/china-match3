# OpenClaw workspace — 本地提交前机器门禁
# 安装：pip install pre-commit && pre-commit install
# 文档：docs/MACHINE_GATES.md
#
# 注意：bandit 安全扫描已移至 CI (.github/workflows/openclaw-gates.yml)
#       本地 pre-commit 只运行假实现检测

repos:
  - repo: local
    hooks:
      - id: detect-fake-implementation
        name: detect fake implementation (Python)
        entry: python3 scripts/detect_fake_implementation.py
        language: system
        pass_filenames: false
        always_run: true

