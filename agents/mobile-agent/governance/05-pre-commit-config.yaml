# Pre-commit 配置

**适用范围:** 所有项目
**执行时机:** 每次 git commit 前
**责任人:** tech-lead + devops-engineer

---

## 🔧 配置文件

### .pre-commit-config.yaml

```yaml
repos:
  # 基础检查
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: trailing-whitespace        # 删除行尾空格
      - id: end-of-file-fixer          # 文件末尾空行
      - id: check-yaml                 # YAML 语法检查
      - id: check-json                 # JSON 语法检查
      - id: check-added-large-files    # 大文件检查
        args: ['--maxkb=1000']
      - id: detect-private-key         # 私钥检测

  # Python 代码质量
  - repo: https://github.com/psf/black
    rev: 23.1.0
    hooks:
      - id: black
        language_version: python3.10

  - repo: https://github.com/pycqa/isort
    rev: 5.12.0
    hooks:
      - id: isort
        args: ["--profile", "black"]

  - repo: https://github.com/pycqa/flake8
    rev: 6.0.0
    hooks:
      - id: flake8
        args: ["--max-line-length=120", "--extend-ignore=E203"]

  # 安全扫描
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.5
    hooks:
      - id: bandit
        args: ["-r", "app/"]

  # 敏感信息检测
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
```

---

## 📝 安装与使用

### 安装

```bash
# 安装 pre-commit
pip install pre-commit

# 安装 git hooks
pre-commit install

# 验证安装
pre-commit --version
```

### 使用

```bash
# 手动运行所有检查
pre-commit run --all-files

# 运行特定检查
pre-commit run black --all-files
pre-commit run flake8 --all-files

# 跳过检查
git commit -m "feat: add feature" --no-verify
```

---

## ✅ 检查项说明

### 基础检查

| 检查项 | 说明 | 严重性 |
|--------|------|--------|
| trailing-whitespace | 删除行尾空格 | 警告 |
| end-of-file-fixer | 文件末尾空行 | 警告 |
| check-yaml | YAML 语法检查 | 错误 |
| check-json | JSON 语法检查 | 错误 |
| check-added-large-files | 大文件检查 (>1MB) | 错误 |
| detect-private-key | 私钥检测 | 严重 |

### Python 检查

| 检查项 | 说明 | 严重性 |
|--------|------|--------|
| black | 代码格式化 | 警告 |
| isort | 导入排序 | 警告 |
| flake8 | 代码风格 | 警告 |
| bandit | 安全扫描 | 严重 |

---

## 🚨 常见问题

### 问题 1: 检查失败

```bash
# 查看详细信息
pre-commit run --all-files --verbose

# 修复后重新提交
git add .
git commit -m "fix: address review comments"
```

### 问题 2: 跳过检查

```bash
# 临时跳过（不推荐）
git commit -m "urgent: hotfix" --no-verify

# 永久禁用（不推荐）
pre-commit uninstall
```

### 问题 3: 更新 hooks

```bash
# 更新到最新版本
pre-commit autoupdate

# 验证更新
pre-commit run --all-files
```

