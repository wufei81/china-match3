## 📈 质量指标

| 指标 | 目标值 | 测量方式 |
|------|--------|----------|
| Pre-commit 覆盖率 | 100% | 提交前检查比例 |
| 一次通过率 | > 80% | 无需修改的提交比例 |
| 平均修复时间 | < 5 分钟 | 检查失败到修复时间 |
| 安全漏洞数 | 0 | bandit 扫描结果 |

