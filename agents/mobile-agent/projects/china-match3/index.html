<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🏮 锦绣消除 - 中国风消消乐</title>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            user-select: none;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-size: 16px;
            position: relative;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 30%, #f093fb 70%, #f5576c 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: calc(env(safe-area-inset-top) + 8px) calc(env(safe-area-inset-right) + 8px) calc(env(safe-area-inset-bottom) + 8px) calc(env(safe-area-inset-left) + 8px);
            position: relative;
        }
        
        /* 动态粒子背景 */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255,255,255,0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(255,255,255,0.15) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(255,255,255,0.1) 0%, transparent 60%);
            animation: bgPulse 6s ease-in-out infinite;
            z-index: -1;
        }
        
        /* 漂浮花瓣效果 */
        .petals {
            position: fixed;
            top: -100px;
            left: 0;
            width: 100%;
            height: calc(100% + 200px);
            pointer-events: none;
            z-index: 0;
            overflow: visible;
        }
        
        .petal {
            position: absolute;
            width: 16px;
            height: 16px;
            background: linear-gradient(135deg, #ffb6c1, #ffc0cb);
            border-radius: 20px 0;
            opacity: 0.6;
            animation: petalFall 8s linear infinite;
        }
        
        @keyframes petalFall {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(calc(100vh + 200px)) rotate(720deg); opacity: 0; }
        }
        
        @keyframes bgPulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }
        
        .main-menu, .game-container {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 24px;
            padding: 20px;
            box-shadow: 
                0 20px 60px rgba(0, 0, 0, 0.3),
                0 0 0 2px rgba(255,255,255,0.3) inset,
                0 0 80px rgba(255,255,255,0.1);
            text-align: center;
            width: min(90vw, 400px);
            height: min(90vh, 700px);
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(30px);
            position: relative;
            overflow: hidden;
            z-index: 10;
        }
        
        .game-container {
            display: none;
        }
        
        /* 容器光晕效果 */
        .main-menu::after, .game-container::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: containerGlow 4s ease-in-out infinite;
            pointer-events: none;
        }
        
        @keyframes containerGlow {
            0%, 100% { opacity: 0.5; transform: rotate(0deg); }
            50% { opacity: 1; transform: rotate(180deg); }
        }
        
        .logo {
            font-size: clamp(28px, 8vw, 42px);
            font-weight: 900;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            text-shadow: 0 4px 20px rgba(102, 126, 234, 0.4);
            animation: logoPulse 3s ease-in-out infinite;
            position: relative;
            z-index: 1;
        }
        
        @keyframes logoPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .subtitle {
            color: #666;
            font-size: clamp(13px, 4vw, 18px);
            margin-bottom: 20px;
            font-weight: 600;
            position: relative;
            z-index: 1;
        }
        
        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 16px;
            flex: 1;
            justify-content: center;
            position: relative;
            z-index: 1;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 16px 28px;
            border-radius: 16px;
            font-size: clamp(16px, 4.5vw, 20px);
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 
                0 8px 24px rgba(102, 126, 234, 0.4),
                0 0 0 2px rgba(255,255,255,0.2) inset;
            position: relative;
            overflow: hidden;
        }
        
        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }
        
        .btn:hover::before {
            left: 100%;
        }
        
        .btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 
                0 12px 32px rgba(102, 126, 234, 0.5),
                0 0 0 2px rgba(255,255,255,0.3) inset;
        }
        
        .btn:active {
            transform: translateY(1px) scale(0.98);
            box-shadow: 
                0 4px 16px rgba(102, 126, 234, 0.4),
                0 0 0 2px rgba(255,255,255,0.2) inset;
        }
        
        .btn-secondary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            box-shadow: 
                0 8px 24px rgba(240, 147, 251, 0.4),
                0 0 0 2px rgba(255,255,255,0.2) inset;
        }
        
        .btn-secondary:hover {
            box-shadow: 
                0 12px 32px rgba(240, 147, 251, 0.5),
                0 0 0 2px rgba(255,255,255,0.3) inset;
        }
        
        .header {
            margin-bottom: 8px;
            position: relative;
            z-index: 1;
        }
        
        .title {
            font-size: clamp(18px, 5vw, 26px);
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2, #f093fb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: titleGlow 3s ease-in-out infinite;
        }
        
        @keyframes titleGlow {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.2); }
        }
        
        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 8px;
            gap: 6px;
            position: relative;
            z-index: 1;
        }
        
        .stat-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 6px 8px;
            border-radius: 10px;
            text-align: center;
            flex: 1;
            min-width: 60px;
            box-shadow: 
                0 4px 16px rgba(102, 126, 234, 0.3),
                0 0 0 2px rgba(255,255,255,0.2) inset;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        
        .stat-box::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 70%);
            animation: statPulse 3s ease-in-out infinite;
        }
        
        @keyframes statPulse {
            0%, 100% { opacity: 0.5; transform: rotate(0deg); }
            50% { opacity: 1; transform: rotate(180deg); }
        }
        
        .stat-box:hover {
            transform: translateY(-3px) scale(1.03);
            box-shadow: 
                0 8px 24px rgba(102, 126, 234, 0.4),
                0 0 0 2px rgba(255,255,255,0.3) inset;
        }
        
        .stat-label {
            font-size: clamp(10px, 2.5vw, 12px);
            opacity: 0.95;
            margin-bottom: 4px;
            font-weight: 600;
            position: relative;
        }
        
        .stat-value {
            font-size: clamp(16px, 4.5vw, 22px);
            font-weight: 800;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
            position: relative;
        }
        
        .board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 3px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 50%, #d4e4ed 100%);
            border-radius: 16px;
            padding: 6px;
            width: 280px;
            max-width: calc(100vw - 60px);
            height: 280px;
            max-height: calc(90vh - 200px);
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.15),
                0 0 0 2px rgba(255,255,255,0.4) inset,
                0 0 40px rgba(255,255,255,0.1);
            margin: 0 auto 10px auto;
            position: relative;
            z-index: 1;
        }
        
        .cell {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(18px, 5vw, 26px);
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 
                0 2px 8px rgba(0, 0, 0, 0.12),
                0 0 0 2px rgba(255,255,255,0.5) inset;
            position: relative;
            overflow: hidden;
        }
        
        .cell::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(255,255,255,0.3));
            opacity: 0;
            transition: opacity 0.3s;
            border-radius: 12px;
        }
        
        .cell:hover::before {
            opacity: 1;
        }
        
        .cell:active {
            transform: scale(0.92);
        }
        
        .cell.selected {
            background: linear-gradient(135deg, #ffeaa7, #fdcb6e, #f39c12);
            transform: scale(1.12);
            box-shadow: 
                0 0 30px rgba(253, 203, 110, 0.8),
                0 0 60px rgba(253, 203, 110, 0.4);
            z-index: 10;
            animation: selectedPulse 0.8s ease-in-out infinite;
        }
        
        @keyframes selectedPulse {
            0%, 100% { 
                box-shadow: 0 0 30px rgba(253, 203, 110, 0.8);
                transform: scale(1.12);
            }
            50% { 
                box-shadow: 0 0 50px rgba(253, 203, 110, 1), 0 0 80px rgba(253, 203, 110, 0.5);
                transform: scale(1.15);
            }
        }
        
        .cell.match {
            animation: matchExplosion 0.45s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        
        @keyframes matchExplosion {
            0% { transform: scale(1); opacity: 1; }
            30% { transform: scale(1.3); opacity: 0.9; }
            60% { transform: scale(0.7); opacity: 0.5; }
            100% { transform: scale(0); opacity: 0; }
        }
        
        .cell.combo {
            animation: comboFlash 0.6s ease-in-out;
        }
        
        @keyframes comboFlash {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.8) saturate(1.5); }
        }
        
        .controls {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            position: relative;
            z-index: 1;
        }
        
        .btn-small {
            padding: 10px 14px;
            font-size: clamp(11px, 3vw, 13px);
            flex: 1;
            max-width: 120px;
        }
        
        .message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.7);
            background: white;
            padding: 28px 36px;
            border-radius: 28px;
            box-shadow: 
                0 30px 90px rgba(0, 0, 0, 0.4),
                0 0 0 3px rgba(255,255,255,0.3) inset,
                0 0 150px rgba(255,255,255,0.15);
            text-align: center;
            display: none;
            z-index: 1000;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            max-width: calc(100vw - 40px);
        }
        
        .message.show {
            display: block;
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
            animation: messageBounce 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        @keyframes messageBounce {
            0% { transform: translate(-50%, -50%) scale(0.7); }
            50% { transform: translate(-50%, -50%) scale(1.05); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }
        
        .message h2 {
            font-size: clamp(24px, 6vw, 32px);
            margin-bottom: 16px;
            background: linear-gradient(135deg, #667eea, #764ba2, #f093fb, #f5576c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: messageGlow 2s ease-in-out infinite;
        }
        
        @keyframes messageGlow {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
        }
        
        .message p {
            color: #666;
            font-size: clamp(16px, 4.5vw, 20px);
            margin-bottom: 24px;
            font-weight: 600;
            white-space: pre-line;
        }
        
        /* 灯笼特殊特效 */
        .cell[data-artifact="3"] {
            animation: lanternGlow 1.5s ease-in-out infinite;
        }
        
        @keyframes lanternGlow {
            0%, 100% { 
                filter: drop-shadow(0 0 8px rgba(255, 69, 0, 0.7));
                transform: scale(1);
            }
            50% { 
                filter: drop-shadow(0 0 18px rgba(255, 69, 0, 1)) drop-shadow(0 0 36px rgba(255, 100, 50, 0.6));
                transform: scale(1.03);
            }
        }
        
        /* 连击特效 */
        .combo-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 999;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.25) 100%);
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .combo-overlay.active {
            animation: comboFlashOverlay 0.6s ease-out;
        }
        
        @keyframes comboFlashOverlay {
            0% { opacity: 0; background: radial-gradient(circle at center, rgba(255,215,0,0.7) 0%, transparent 70%); }
            50% { opacity: 1; }
            100% { opacity: 0; }
        }
        
        /* 安全区域适配 */
        @supports (padding: max(0px)) {
            body {
                padding: max(8px, env(safe-area-inset-top)) 
                         max(8px, env(safe-area-inset-right)) 
                         max(8px, env(safe-area-inset-bottom)) 
                         max(8px, env(safe-area-inset-left));
            }
        }
        
        /* 横屏适配 */
        @media (max-aspect-ratio: 1/1) {
            .main-menu, .game-container {
                width: min(80vh, 500px);
                height: min(80vw, 350px);
            }
        }
        
        /* 小屏幕手机适配 */
        @media (max-width: 375px) {
            .main-menu, .game-container {
                width: min(92vw, 340px);
                height: min(92vh, 580px);
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <!-- 漂浮花瓣背景 -->
    <div class="petals" id="petals"></div>
    
    <!-- 连击特效层 -->
    <div class="combo-overlay" id="comboOverlay"></div>
    
    <!-- 主菜单界面 -->
    <div class="main-menu" id="mainMenu">
        <div class="logo">🏮 锦绣消除</div>
        <div class="subtitle">中国风激情消消乐</div>
        <div class="menu-buttons">
            <button class="btn btn-large" onclick="startGame()">🎮 开始游戏</button>
            <button class="btn btn-large btn-secondary" onclick="showBestScore()">🏆 最高分：<span id="menuBestScore">0</span></button>
        </div>
    </div>

    <!-- 游戏界面 -->
    <div class="game-container" id="gameContainer">
        <div class="header">
            <div class="title">🏮 锦绣消除</div>
        </div>
        <div class="stats">
            <div class="stat-box">
                <div class="stat-label">得分</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">步数</div>
                <div class="stat-value" id="moves">20</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">最佳</div>
                <div class="stat-value" id="best">0</div>
            </div>
        </div>
        <div class="board" id="board"></div>
        <div class="controls">
            <button class="btn btn-small btn-secondary" onclick="backToMenu()">← 返回菜单</button>
            <button class="btn btn-small" onclick="game.newGame()">🔄 新游戏</button>
        </div>
    </div>

    <div class="message" id="message">
        <h2 id="message-title">🎉</h2>
        <p id="message-text"></p>
        <button class="btn" onclick="game.hideMessage()">继续</button>
    </div>

    <script>
        // 创建漂浮花瓣
        function createPetals() {
            const petalsContainer = document.getElementById('petals');
            for (let i = 0; i < 12; i++) {
                const petal = document.createElement('div');
                petal.className = 'petal';
                petal.style.left = Math.random() * 100 + '%';
                petal.style.animationDelay = Math.random() * 8 + 's';
                petal.style.animationDuration = (8 + Math.random() * 4) + 's';
                petalsContainer.appendChild(petal);
            }
        }
        createPetals();

        // 🎵 激情音效系统 - 优化版（更清脆激情）
        class SoundManager {
            constructor() {
                this.audioCtx = null;
                this.enabled = true;
                this.masterVolume = 0.65;
                this.bassBoost = true;
            }
            
            init() {
                if (!this.audioCtx) {
                    try {
                        this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                        this.masterVolume = 0.65;
                    } catch (e) {
                        console.warn('Audio context not supported');
                        this.enabled = false;
                    }
                }
            }
            
            // 激情版音效 - 更清脆 + 更激情
            playTone(freq, duration, type = 'sine', volume = 0.4, harmonics = []) {
                if (!this.enabled || !this.audioCtx) return;
                try {
                    // 主音
                    const osc = this.audioCtx.createOscillator();
                    const gain = this.audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(this.audioCtx.destination);
                    osc.frequency.value = freq;
                    osc.type = type;
                    gain.gain.setValueAtTime(volume * this.masterVolume, this.audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, this.audioCtx.currentTime + duration);
                    osc.start(this.audioCtx.currentTime);
                    osc.stop(this.audioCtx.currentTime + duration);
                    
                    // 和弦音（增加激情效果）
                    harmonics.forEach(h => {
                        const osc2 = this.audioCtx.createOscillator();
                        const gain2 = this.audioCtx.createGain();
                        osc2.connect(gain2);
                        gain2.connect(this.audioCtx.destination);
                        osc2.frequency.value = h;
                        osc2.type = 'sine';
                        gain2.gain.setValueAtTime(volume * 0.35 * this.masterVolume, this.audioCtx.currentTime);
                        gain2.gain.exponentialRampToValueAtTime(0.01, this.audioCtx.currentTime + duration * 0.85);
                        osc2.start(this.audioCtx.currentTime);
                        osc2.stop(this.audioCtx.currentTime + duration * 0.85);
                    });
                } catch (e) {
                    console.warn('Error playing tone:', e);
                }
            }
            
            // 点击音效 - 更清脆的双音 + 高音和弦
            playSelect() {
                this.playTone(1047, 0.12, 'sine', 0.45, [1319, 1568]); // C6 + 和弦
            }
            
            // 消除音效 - 激情版三音快速上行 + 明亮和弦
            playMatch(count) {
                const baseFreq = 784; // G5
                const chordFreqs = [
                    [784, 988, 1175],  // G5 + B5 + D6
                    [988, 1245, 1480], // B5 + D#6 + F#6
                    [1175, 1480, 1760] // D6 + F#6 + A6
                ];
                const chord = chordFreqs[Math.min(count - 1, 2)];
                chord.forEach((f, i) => {
                    setTimeout(() => this.playTone(f, 0.2, 'sine', 0.5, [f * 1.5, f * 2]), i * 70);
                });
            }
            
            // 连击音效 - 完整七声音阶上行 + 激情和弦 + 低音
            playCombo(level) {
                const scale = [523, 659, 784, 988, 1047, 1318, 1568, 1976]; // 完整音阶
                const numNotes = Math.min(level + 4, 8);
                scale.slice(0, numNotes).forEach((f, i) => {
                    setTimeout(() => {
                        this.playTone(f, 0.25, 'sine', 0.55, [f * 1.25, f * 1.5, f * 2]);
                        // 添加低音增强
                        if (this.bassBoost) {
                            this.playTone(f / 2, 0.35, 'triangle', 0.35);
                        }
                    }, i * 110);
                });
                
                // 触发连击视觉特效
                this.triggerComboOverlay();
            }
            
            // 无效交换音效 - 柔和提示
            playInvalid() {
                this.playTone(262, 0.15, 'triangle', 0.28, [330]); // C4 + 和弦
                setTimeout(() => this.playTone(220, 0.2, 'triangle', 0.22, [277]), 100);
            }
            
            // 胜利音效 - 完整上行音阶 + 三重和弦 + 低音
            playWin() {
                const winFreqs = [523, 659, 784, 988, 1047, 1318, 1568, 1976, 2093];
                winFreqs.forEach((f, i) => {
                    setTimeout(() => {
                        this.playTone(f, 0.3, 'sine', 0.6, [f * 1.25, f * 1.5, f * 2, f * 2.5]);
                        if (this.bassBoost && i < 5) {
                            this.playTone(f / 2, 0.45, 'triangle', 0.4);
                        }
                    }, i * 140);
                });
            }
            
            // 失败音效 - 柔和下降
            playLose() {
                const loseFreqs = [440, 392, 349, 330, 294];
                loseFreqs.forEach((f, i) => {
                    setTimeout(() => this.playTone(f, 0.35, 'sine', 0.38, [f * 1.5]), i * 200);
                });
            }
            
            // 触发连击视觉特效
            triggerComboOverlay() {
                const overlay = document.getElementById('comboOverlay');
                overlay.classList.remove('active');
                void overlay.offsetWidth; // 强制重绘
                overlay.classList.add('active');
            }
        }

        // 创建全局音效管理器
        const soundManager = new SoundManager();

        class Match3Game {
            constructor() {
                this.rows = 8;
                this.cols = 8;
                this.artifacts = ['🪞', '🪭', '🏺', '🏮', '🍶', '📜'];
                this.board = [];
                this.selected = null;
                this.score = 0;
                this.moves = 20;
                this.best = parseInt(localStorage.getItem('match3_best')) || 0;
                this.isProcessing = false;
                this.comboCount = 0;
            }
            
            init() {
                soundManager.init();
                this.updateUI();
                this.newGame();
            }
            
            newGame() {
                this.board = [];
                this.score = 0;
                this.moves = 20;
                this.selected = null;
                this.isProcessing = false;
                this.comboCount = 0;
                do {
                    this.generateBoard();
                } while (this.findMatches().length > 0);
                this.render();
                this.updateUI();
            }
            
            generateBoard() {
                this.board = [];
                for (let r = 0; r < this.rows; r++) {
                    this.board[r] = [];
                    for (let c = 0; c < this.cols; c++) {
                        this.board[r][c] = this.artifacts[Math.floor(Math.random() * this.artifacts.length)];
                    }
                }
            }
            
            render() {
                const boardEl = document.getElementById('board');
                boardEl.innerHTML = '';
                for (let r = 0; r < this.rows; r++) {
                    for (let c = 0; c < this.cols; c++) {
                        const cell = document.createElement('div');
                        cell.className = 'cell';
                        cell.textContent = this.board[r][c];
                        cell.dataset.r = r;
                        cell.dataset.c = c;
                        cell.dataset.artifact = this.artifacts.indexOf(this.board[r][c]);
                        cell.addEventListener('click', (e) => {
                            e.preventDefault();
                            this.handleClick(r, c);
                        });
                        cell.addEventListener('touchstart', (e) => {
                            e.preventDefault();
                            this.handleClick(r, c);
                        }, {passive: false});
                        boardEl.appendChild(cell);
                    }
                }
            }
            
            handleClick(r, c) {
                if (this.isProcessing || this.moves <= 0) return;
                soundManager.playSelect();
                if (!this.selected) {
                    this.selected = {r, c};
                    this.getCell(r, c).classList.add('selected');
                } else {
                    this.getCell(this.selected.r, this.selected.c).classList.remove('selected');
                    if (this.selected.r === r && this.selected.c === c) {
                        this.selected = null;
                    } else if (Math.abs(this.selected.r - r) + Math.abs(this.selected.c - c) === 1) {
                        this.swap(this.selected, {r, c});
                        this.selected = null;
                    } else {
                        this.selected = {r, c};
                        this.getCell(r, c).classList.add('selected');
                    }
                }
            }
            
            getCell(r, c) {
                return document.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);
            }
            
            async swap(pos1, pos2) {
                this.isProcessing = true;
                const temp = this.board[pos1.r][pos1.c];
                this.board[pos1.r][pos1.c] = this.board[pos2.r][pos2.c];
                this.board[pos2.r][pos2.c] = temp;
                this.render();
                const matches = this.findMatches();
                if (matches.length === 0) {
                    await this.sleep(180);
                    const temp = this.board[pos1.r][pos1.c];
                    this.board[pos1.r][pos1.c] = this.board[pos2.r][pos2.c];
                    this.board[pos2.r][pos2.c] = temp;
                    this.render();
                    soundManager.playInvalid();
                } else {
                    this.moves--;
                    this.comboCount = 0;
                    await this.processMatches(matches);
                }
                this.updateUI();
                this.isProcessing = false;
                if (this.moves <= 0) this.endGame();
            }
            
            findMatches() {
                const matches = [];
                for (let r = 0; r < this.rows; r++) {
                    for (let c = 0; c < this.cols - 2; c++) {
                        const e = this.board[r][c];
                        if (!e) continue;
                        let n = 1;
                        while (c + n < this.cols && this.board[r][c + n] === e) n++;
                        if (n >= 3) {
                            for (let i = 0; i < n; i++) matches.push({r, c: c + i});
                            c += n - 1;
                        }
                    }
                }
                for (let c = 0; c < this.cols; c++) {
                    for (let r = 0; r < this.rows - 2; r++) {
                        const e = this.board[r][c];
                        if (!e) continue;
                        let n = 1;
                        while (r + n < this.rows && this.board[r + n][c] === e) n++;
                        if (n >= 3) {
                            for (let i = 0; i < n; i++) matches.push({r: r + i, c});
                            r += n - 1;
                        }
                    }
                }
                const unique = [];
                const seen = new Set();
                for (const match of matches) {
                    const key = `${match.r}-${match.c}`;
                    if (!seen.has(key)) {
                        seen.add(key);
                        unique.push(match);
                    }
                }
                return unique;
            }
            
            async processMatches(matches) {
                const cells = matches.map(m => this.getCell(m.r, m.c));
                cells.forEach(cell => cell.classList.add('match'));
                soundManager.playMatch(matches.length);
                const points = matches.length * 10;
                const bonus = matches.length > 3 ? (matches.length - 3) * 20 : 0;
                this.score += points + bonus;
                await this.sleep(300);
                matches.forEach(m => {
                    this.board[m.r][m.c] = null;
                });
                await this.dropAndFill();
                const newMatches = this.findMatches();
                if (newMatches.length > 0) {
                    this.comboCount++;
                    if (this.comboCount > 1) {
                        soundManager.playCombo(this.comboCount);
                        cells.forEach(cell => cell.classList.add('combo'));
                    }
                    await this.sleep(200);
                    await this.processMatches(newMatches);
                }
                this.updateUI();
            }
            
            async dropAndFill() {
                for (let c = 0; c < this.cols; c++) {
                    for (let r = this.rows - 1; r >= 0; r--) {
                        if (this.board[r][c] === null) {
                            for (let ar = r - 1; ar >= 0; ar--) {
                                if (this.board[ar][c] !== null) {
                                    this.board[r][c] = this.board[ar][c];
                                    this.board[ar][c] = null;
                                    break;
                                }
                            }
                        }
                    }
                    for (let r = 0; r < this.rows; r++) {
                        if (this.board[r][c] === null) {
                            this.board[r][c] = this.artifacts[Math.floor(Math.random() * this.artifacts.length)];
                        }
                    }
                }
                this.render();
                await this.sleep(400);
            }
            
            updateUI() {
                document.getElementById('score').textContent = this.score;
                document.getElementById('moves').textContent = this.moves;
                document.getElementById('best').textContent = this.best;
            }
            
            endGame() {
                if (this.score > this.best) {
                    this.best = this.score;
                    localStorage.setItem('match3_best', this.best);
                    soundManager.playWin();
                    this.showMessage('🏆 新纪录!', `得分：${this.score}\n最佳：${this.best}`);
                } else {
                    soundManager.playLose();
                    this.showMessage('🎮 游戏结束', `得分：${this.score}\n最佳：${this.best}`);
                }
            }
            
            showMessage(title, text) {
                document.getElementById('message-title').textContent = title;
                document.getElementById('message-text').textContent = text;
                document.getElementById('message').classList.add('show');
            }
            
            hideMessage() {
                document.getElementById('message').classList.remove('show');
            }
            
            sleep(ms) {
                return new Promise(resolve => setTimeout(resolve, ms));
            }
        }

        const game = new Match3Game();

        function startGame() {
            soundManager.init();
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('gameContainer').style.display = 'flex';
            game.newGame();
        }

        function backToMenu() {
            document.getElementById('gameContainer').style.display = 'none';
            document.getElementById('mainMenu').style.display = 'flex';
            document.getElementById('menuBestScore').textContent = localStorage.getItem('match3_best') || 0;
        }

        function showBestScore() {
            const best = localStorage.getItem('match3_best') || 0;
            alert('🏆 最高分：' + best + '\n\n继续努力！');
        }

        // 初始化游戏
        game.init();
    </script>
</body>
