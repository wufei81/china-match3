name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # Gate 3: 开发质量检查
  quality-gate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      # Lint 检查
      - name: Gate 3 - Lint
        run: npm run lint
        continue-on-error: false
      
      # 单元测试
      - name: Gate 3 - Test
        run: npm run test --coverage
      
      # 覆盖率检查
      - name: Gate 3 - Check Coverage
        run: |
          COVERAGE=$(cat coverage/coverage-summary.json | jq '.total.lines.pct')
          if (( $(echo "$COVERAGE < 80" | bc -l) )); then
            echo "❌ Coverage ${COVERAGE}% < 80%"
            exit 1
          fi
          echo "✅ Coverage ${COVERAGE}%"
      
      # 构建检查
      - name: Gate 3 - Build
        run: npm run build
      
      # 上传覆盖率报告
      - name: Upload Coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info
          flags: unittests
          fail_ci_if_error: false

  # Gate 5: 安全检查
  security-scan:
    runs-on: ubuntu-latest
    needs: quality-gate
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm ci
      
      # 检查硬编码密钥
      - name: Gate 5 - Check Hardcoded Secrets
        run: |
          if grep -r "password.*=" src/ --include="*.ts" --include="*.js"; then
            echo "❌ Hardcoded password found"
            exit 1
          fi
          echo "✅ No hardcoded secrets"
      
      # 检查健康检查端点
      - name: Gate 5 - Check Health Endpoints
        run: |
          if ! grep -r "/health" src/ --include="*.ts" --include="*.js"; then
            echo "❌ Missing health check endpoint"
            exit 1
          fi
          echo "✅ Health check endpoint configured"
      
      # 检查 SQL 注入
      - name: Gate 5 - Check SQL Injection
        run: |
          if grep -r "f\"SELECT\|f\"INSERT\|f\"DROP" src/ --include="*.ts" --include="*.js"; then
            echo "❌ SQL injection risk found"
            exit 1
          fi
          echo "✅ No SQL injection risks"

  # 部署到 Staging
  deploy-staging:
    runs-on: ubuntu-latest
    needs: [quality-gate, security-scan]
    if: github.ref == 'refs/heads/develop'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Deploy to Staging
        run: |
          echo "🚀 Deploying to staging..."
          # 添加实际部署命令
          echo "✅ Staging deployment complete"

  # 部署到 Production
  deploy-production:
    runs-on: ubuntu-latest
    needs: [quality-gate, security-scan]
    if: github.ref == 'refs/heads/main'
    
    environment:
      name: production
      url: https://your-app.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Deploy to Production
        run: |
          echo "🚀 Deploying to production..."
          # 添加实际部署命令
          echo "✅ Production deployment complete"
